{% extends "myapp/base.html" %}

{% block content %}
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="{% url 'index' %}">MyApp</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'index' %}">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'get_clients' %}">Посмотреть список клиентов</a>
                </li>
            </ul>
        </div>
    </nav>
    <h2>Информация о клиенте</h2>
    <p>ID: {{ client.id }}</p>
    <p>Имя: {{ client.client_name }}</p>
    <p>Статус контакта: {{ client.contact_status }}</p>
    <p>Заметки: {{ client.notes }}</p>
{% endblock %}
