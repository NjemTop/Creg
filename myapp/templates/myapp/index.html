{% extends "myapp/base.html" %}

{% block content %}
    <div class="content-container">
        <h1>Добро пожаловать!</h1>
        <div class="buttons">
            <a class="btn btn-primary btn-lg" href="/get_clients/" role="button">Посмотреть список всех контактов</a>
        </div>
        <div class="admin-button">
            <a class="btn btn-info btn-lg" href="/admin/" role="button">Панель администрирования</a>
        </div>
        <div class="dropdown mt-2">
            <button class="btn btn-primary btn-lg dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                Выбрать клиента
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                <div class="input-group">
                    <input type="text" id="client-search" class="form-control" placeholder="Введите имя клиента..." aria-label="Client search">
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script>
        $(document).ready(function() {
            $("#client-search").autocomplete({
                source: function(request, response) {
                    $.getJSON("{% url 'search_clients' %}", {
                        query: request.term
                    }, function(data) {
                        response($.map(data, function(item) {
                            return {
                                label: item.client_name,
                                value: item.id
                            };
                        }));
                    });
                },
                minLength: 2,
                select: function(event, ui) {
                    window.location.href = "{% url 'get_client' 0 %}".replace('0', ui.item.value);
                }
            });
        });

        // Обработчик клика на кнопку "Выбрать клиента"
        $("#toggleDropdown").on("click", function() {
            $("#search-container").toggle();
        });
    </script>
{% endblock %}
