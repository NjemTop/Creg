{% extends "myapp/base.html" %}

{% block content %}
    <h1>Список всех клиентов</h1>
    <table class="table">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Имя клиента</th>
                <th scope="col">Телефон</th>
                <th scope="col">Email</th>
            </tr>
        </thead>
        <tbody>
            {% for client in clients %}
                <tr>
                    <td>{{ client.id }}</td>
                    <td><a href="{% url 'get_client' client.id %}">{{ client.client_name }}</a></td>
                    <td>{{ client.phone }}</td>
                    <td>{{ client.email }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
